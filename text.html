<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 必加：手机适配核心标签 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>可旋转转盘（手机/电脑通用）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f5f5f5;
        }

        /* 转盘样式 + 手机硬件加速 */
        #wheel {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: conic-gradient(
                #ff6b6b 0deg 60deg,
                #ffd93d 60deg 120deg,
                #6bd425 120deg 180deg,
                #4d96ff 180deg 240deg,
                #9f6bff 240deg 300deg,
                #ff6fcf 300deg 360deg
            );
            position: relative;
            cursor: grab;
            /* 手机流畅旋转优化 */
            transform-origin: center center;
            will-change: transform;
            touch-action: none; /* 禁止浏览器默认触摸行为 */
        }
        /* 转盘中心点 */
        #wheel::after {
            content: '';
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

    <div id="wheel"></div>

<script>
const wheel = document.getElementById('wheel');
let isDragging = false;
let startAngle = 0;
let currentAngle = 0;

// 统一获取：电脑鼠标 / 手机触摸 坐标
function getRotationAngle(e) {
    const rect = wheel.getBoundingClientRect();
    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;
    
    // 兼容手机触摸坐标
    let clientX = e.clientX;
    let clientY = e.clientY;
    if (e.type.includes('touch')) {
        clientX = e.changedTouches[0].clientX;
        clientY = e.changedTouches[0].clientY;
    }

    // 计算旋转角度
    const rad = Math.atan2(clientY - centerY, clientX - centerX);
    return rad * (180 / Math.PI);
}

// 开始拖动/触摸
function start(e) {
    isDragging = true;
    startAngle = getRotationAngle(e) - currentAngle;
    e.preventDefault();
}

// 拖动中/滑动中
function move(e) {
    if (!isDragging) return;
    currentAngle = getRotationAngle(e) - startAngle;
    wheel.style.transform = `rotate(${currentAngle}deg)`;
    e.preventDefault();
}

// 结束拖动/松开手指
function end() {
    isDragging = false;
}

// ==============================================
// 核心修复：同时绑定 鼠标事件 + 手机触摸事件
// ==============================================
// 电脑鼠标
wheel.addEventListener('mousedown', start);
document.addEventListener('mousemove', move);
document.addEventListener('mouseup', end);

// 手机触摸（关键！之前没有这个手机就转不了）
wheel.addEventListener('touchstart', start);
document.addEventListener('touchmove', move);
document.addEventListener('touchend', end);
</script>

</body>
</html>
